<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">
<style>
.bt{font-family:'Montserrat',sans-serif;max-width:480px;margin:1.5rem auto;border:1px solid #d4c4b0;background:#faf8f5;overflow:hidden}
.bt-hdr{background:#1a1a1a;color:#f5f0e8;padding:1rem 1.5rem;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none}
.bt-hdr-t{font-size:.72rem;letter-spacing:.2em;text-transform:uppercase;font-weight:600}
.bt-tog{font-size:1.2rem;transition:transform .3s}
.bt-tog.open{transform:rotate(45deg)}
.bt-bdy{display:none;padding:1.2rem 1.5rem}
.bt-bdy.open{display:block}
.bt-intro{font-size:.72rem;color:#888;margin-bottom:.8rem;line-height:1.6}
.bt-badge{display:inline-block;font-size:.65rem;letter-spacing:.12em;text-transform:uppercase;font-weight:600;background:#1a1a1a;color:#f5f0e8;padding:.3rem .8rem;border-radius:3px;margin-bottom:1rem}
.bt-inp{display:grid;grid-template-columns:1fr 1fr;gap:.8rem;margin-bottom:.8rem}
.bt-ig label{display:block;font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;color:#666;margin-bottom:.3rem;font-weight:600}
.bt-ig input{width:100%;padding:.5rem .4rem;border:1px solid #d4c4b0;background:#fff;font-size:1rem;font-family:'Montserrat',sans-serif;text-align:center;color:#1a1a1a;box-sizing:border-box;outline:none;border-radius:3px}
.bt-ig input:focus{border-color:#1a1a1a}
.bt-unit{font-size:.6rem;color:#aaa;text-align:center;margin-top:.2rem}
.bt-btn{width:100%;padding:.75rem;background:#1a1a1a;color:#f5f0e8;border:none;font-family:'Montserrat',sans-serif;font-size:.72rem;letter-spacing:.15em;text-transform:uppercase;font-weight:600;cursor:pointer;margin-top:.4rem;border-radius:3px}
.bt-btn:hover{background:#333}
.bt-res{margin-top:1rem;padding:1rem 1.2rem;border:1px solid #d4c4b0;background:#fff;display:none;border-radius:3px}
.bt-res.show{display:block}
.bt-rl{font-size:.6rem;letter-spacing:.15em;text-transform:uppercase;color:#888;margin-bottom:.4rem;font-weight:600}
.bt-rt{font-size:2.4rem;color:#1a1a1a;font-weight:600;line-height:1}
.bt-rd{font-size:.7rem;color:#555;margin-top:.5rem;line-height:1.6}
.bt-tip{font-size:.68rem;color:#1a1a1a;background:#f5f0e8;padding:.5rem .7rem;margin-top:.6rem;border-left:2px solid #1a1a1a;line-height:1.5}
.bt-warn{font-size:.68rem;color:#b06020;margin-top:.4rem;font-style:italic}
.bt-tit{font-size:.62rem;letter-spacing:.15em;text-transform:uppercase;color:#888;margin:1rem 0 .4rem;font-weight:600}
.bt-tbl{border-collapse:collapse;width:100%}
.bt-tbl th{font-size:.6rem;letter-spacing:.08em;text-transform:uppercase;color:#888;padding:.4rem .5rem;border-bottom:1px solid #d4c4b0;text-align:center;font-weight:600}
.bt-tbl td{font-size:.75rem;color:#333;padding:.35rem .5rem;text-align:center;border-bottom:1px solid #ede8e0}
.bt-tbl tr.hl td{background:#f5f0e8;font-weight:600;color:#1a1a1a}
</style>
<div class="bt">
  <div class="bt-hdr" onclick="bttCamisaFlor()">
    <span class="bt-hdr-t">Guía de talles</span>
    <span class="bt-tog" id="btiCamisaFlor">+</span>
  </div>
  <div class="bt-bdy" id="btbCamisaFlor">
    <p class="bt-intro">Medite el contorno de busto y el largo de la prenda para encontrar tu talle ideal.</p>
    <div class="bt-badge">Corte: Recto</div>
    <div class="bt-inp">
      <div class="bt-ig"><label>Contorno de busto</label><input type="number" id="btcCamisaFlor" placeholder="61" min="40" max="150"><div class="bt-unit">cm</div></div>
      <div class="bt-ig"><label>Largo</label><input type="number" id="btlCamisaFlor" placeholder="70" min="30" max="150"><div class="bt-unit">cm</div></div>
    </div>
    <button class="bt-btn" onclick="btcalcCamisaFlor()">Calcular mi talle</button>
    <div class="bt-res" id="btrCamisaFlor">
      <div class="bt-rl">Tu talle recomendado</div>
      <div class="bt-rt" id="bttalCamisaFlor"></div>
      <div class="bt-rd" id="btdescCamisaFlor"></div>
      <div class="bt-tip">Corte recto: caída uniforme. El talle es fiel a tus medidas de busto.</div>
      <div class="bt-warn" id="btwarnCamisaFlor"></div>
    </div>
    <p class="bt-tit">Tabla de medidas</p>
    <table class="bt-tbl">
      <thead><tr><th>Talle</th><th>Contorno busto (cm)</th><th>Largo (cm)</th></tr></thead>
      <tbody><tr id="btrCamisaFlor_Denim"><td>Denim</td><td>61</td><td>70</td></tr></tbody>
    </table>
  </div>
</div>
<script>
var btdCamisaFlor=[{"t":"Denim","c":61,"l":70}];
function bttCamisaFlor(){var b=document.getElementById('btbCamisaFlor'),i=document.getElementById('btiCamisaFlor'),o=b.classList.toggle('open');i.classList.toggle('open',o);}
function btcalcCamisaFlor(){
  var c=parseFloat(document.getElementById('btcCamisaFlor').value);
  var l=parseFloat(document.getElementById('btlCamisaFlor').value);
  if(!c&&!l){alert('Ingresá al menos una medida.');return;}
  var sc=btdCamisaFlor.map(function(t){var s=0,n=0;if(c&&t.c){s+=Math.abs(c-t.c);n++;}if(l&&t.l){s+=Math.abs(l-t.l);n++;}return n>0?s/n:999;});
  var idx=sc.indexOf(Math.min.apply(null,sc)),rec=btdCamisaFlor[idx];
  btdCamisaFlor.forEach(function(t){var r=document.getElementById('btrCamisaFlor_'+t.t);if(r)r.classList.remove('hl');});
  var hr=document.getElementById('btrCamisaFlor_'+rec.t);if(hr)hr.classList.add('hl');
  document.getElementById('bttalCamisaFlor').textContent=rec.t;
  var desc='';if(rec.c)desc+='Contorno busto: '+rec.c+' cm';if(rec.l)desc+=(desc?' · ':'')+'Largo: '+rec.l+' cm';
  document.getElementById('btdescCamisaFlor').textContent=desc;
  document.getElementById('btwarnCamisaFlor').textContent=sc[idx]>4?'Tus medidas están entre dos talles. Si dudás, elegí el más grande.':'';
  document.getElementById('btrCamisaFlor').classList.add('show');
}
</script>
